  <style>

    /* ESTILOS CRÍTICOS PARA LCP — light-first, sin flash        */

    html, body {
      margin: 0;
      padding: 0;
      background: #FAFBFC;
      color: #0C1220;

      margin: 0 auto;

      text-transform: uppercase;
      color: #5A6472;
      margin: 0 0 24px;
    }

    #brand-lcp {
      font-family: 'Bricolage Grotesque', 'Instrument Sans', system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.05;
      font-size: clamp(2.5rem, 6vw, 4.5rem);
      margin: 0;
      max-width: 17ch;
    }
  </style>
